<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes das Empresas</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilosite.css">
</head>

<body>
  <div class="container my-5">
    <div class="d-flex flex-column align-items-center gap-3">
      <div class="mb-3" style="width: 200px;">
        <label for="nome" class="form-label">Nome do Usuário</label>
        <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
      </div>

      <div class="mb-3" style="width: 200px;">
        <label for="telefone" class="form-label">Número de Telefone</label>
        <input type="tel" class="form-control" id="telefone" placeholder="Digite seu telefone">
      </div>

      <div class="mb-3" style="width: 200px;">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="Digite seu email">
      </div>

      <div class="mb-3" style="width: 200px;">
        <label for="linkurl" class="form-label">Link URL</label>
        <input type="url" class="form-control" id="linkurl" placeholder="Digite seu link (ex: LinkedIn)">
      </div>
    </div>
  </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
